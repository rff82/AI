name: Deploy farpa.ai

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate version.json
        run: |
          VERSION="v$(date +'%Y.%m.%d')-${{ github.run_number }}"
          DATE="$(date +'%b %Y')"
          SHORT_COMMIT="${{ github.sha }}"
          SHORT_COMMIT="${SHORT_COMMIT:0:7}"
          cat > version.json << EOF
          {
            "version": "${VERSION}",
            "date": "${DATE}",
            "commit": "${SHORT_COMMIT}",
            "run": "${{ github.run_number }}",
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF
          echo "Generated: ${VERSION}"
          cat version.json

      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CF_PAGES_API_TOKEN }}
          accountId: ${{ secrets.CF_PAGES_ACCOUNT_ID }}
          projectName: rff82-ai
          directory: .
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          branch: main
          wranglerVersion: '3'

      - name: Upload deploy log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deploy-log-${{ github.run_number }}
          path: version.json
          retention-days: 30

  record-failure:
    name: Record CI Failure
    runs-on: ubuntu-latest
    needs: deploy
    if: failure()
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Append failure to CLAUDE.md
        run: |
          DATE="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          ENTRY="- \`${DATE}\` — run #${{ github.run_number }} — commit \`${GITHUB_SHA:0:7}\` — [ver log](${RUN_URL})"
          if ! grep -q "## HISTÓRICO DE FALHAS DE CI" CLAUDE.md; then
            echo -e "\n## HISTÓRICO DE FALHAS DE CI\n${ENTRY}" >> CLAUDE.md
          else
            sed -i "/## HISTÓRICO DE FALHAS DE CI/a ${ENTRY}" CLAUDE.md
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CLAUDE.md
          git commit -m "chore: [skip ci] record CI failure run #${{ github.run_number }}"
          git push

      - name: Open failure issue
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `ci-failure: deploy falhou (run #${{ github.run_number }})`,
              labels: ['ci-failure'],
              body: `Deploy falhou em [run #${{ github.run_number }}](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}).\n\nCommit: \`${context.sha.substring(0,7)}\``
            });
