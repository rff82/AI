<svg viewBox="0 0 1080 1080" width="1080" height="1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#0f1f18"/>
      <stop offset="100%" stop-color="#050a07"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00ff88" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#00ff88" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Fundo -->
  <rect width="1080" height="1080" fill="url(#bg)"/>
  <!-- Glow central -->
  <circle cx="540" cy="500" r="380" fill="url(#glow)"/>
  <!-- Grid sutil -->
  <line x1="0" y1="270" x2="1080" y2="270" stroke="#00ff88" stroke-width="1" stroke-opacity="0.12"/>
  <line x1="0" y1="540" x2="1080" y2="540" stroke="#00ff88" stroke-width="1" stroke-opacity="0.12"/>
  <line x1="0" y1="810" x2="1080" y2="810" stroke="#00ff88" stroke-width="1" stroke-opacity="0.12"/>
  <line x1="270" y1="0" x2="270" y2="1080" stroke="#00ff88" stroke-width="1" stroke-opacity="0.12"/>
  <line x1="540" y1="0" x2="540" y2="1080" stroke="#00ff88" stroke-width="1" stroke-opacity="0.12"/>
  <line x1="810" y1="0" x2="810" y2="1080" stroke="#00ff88" stroke-width="1" stroke-opacity="0.12"/>
  <!-- Ícone farpa — grande e centrado -->
  <g transform="translate(540,490) scale(11)">
    <polygon points="0,-38 22,-18 14,-2 28,16 0,28 -28,16 -14,-2 -22,-18" fill="none" stroke="#00ff88" stroke-width="1.2" stroke-linejoin="round"/>
    <polygon points="0,-24 14,-12 8,-2 18,12 0,20 -18,12 -8,-2 -14,-12" fill="rgba(0,255,136,0.12)" stroke="#00ff88" stroke-width="0.7" stroke-linejoin="round"/>
    <circle cx="0" cy="0" r="3.5" fill="#00ff88"/>
    <line x1="0" y1="-38" x2="0" y2="-24" stroke="#00e5ff" stroke-width="0.9" opacity="0.8"/>
    <line x1="22" y1="-18" x2="14" y2="-12" stroke="#00e5ff" stroke-width="0.9" opacity="0.8"/>
    <line x1="28" y1="16" x2="18" y2="12" stroke="#00e5ff" stroke-width="0.9" opacity="0.8"/>
    <line x1="-28" y1="16" x2="-18" y2="12" stroke="#00e5ff" stroke-width="0.9" opacity="0.8"/>
    <line x1="-22" y1="-18" x2="-14" y2="-12" stroke="#00e5ff" stroke-width="0.9" opacity="0.8"/>
  </g>
  <!-- Wordmark -->
  <text x="430" y="808" font-family="'Space Grotesk',Arial Black,sans-serif" font-size="120" font-weight="900" letter-spacing="-5" fill="#f0f0ef">farpa</text>
  <text x="836" y="808" font-family="'Space Grotesk',Arial,sans-serif" font-size="120" font-weight="300" letter-spacing="-3" fill="#00ff88">.ai</text>
  <!-- Tagline -->
  <text x="540" y="878" text-anchor="middle" font-family="'DM Mono',monospace" font-size="32" letter-spacing="6" fill="rgba(240,240,239,0.55)">notícias que cortam</text>
  <!-- Borda sutil -->
  <rect width="1080" height="1080" fill="none" stroke="#00ff88" stroke-width="3" stroke-opacity="0.15"/>
</svg>
