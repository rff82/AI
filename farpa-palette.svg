<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 220" width="700" height="220">
  <rect width="700" height="220" fill="#0a0a0a"/>
  <!-- Title -->
  <text x="32" y="36" font-family="'DM Mono', monospace" font-size="10" letter-spacing="3" fill="rgba(240,240,239,0.4)">FARPA.AI · PALETA DE CORES</text>

  <!-- Swatch 1: Void -->
  <rect x="32" y="54" width="76" height="100" rx="8" fill="#0a0a0a" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <text x="70" y="172" font-family="'Space Grotesk', sans-serif" font-size="11" font-weight="700" fill="#f0f0ef" text-anchor="middle">Void</text>
  <text x="70" y="186" font-family="'DM Mono', monospace" font-size="9" fill="rgba(240,240,239,0.4)" text-anchor="middle">#0a0a0a</text>

  <!-- Swatch 2: Grafite -->
  <rect x="120" y="54" width="76" height="100" rx="8" fill="#1e1e1e"/>
  <text x="158" y="172" font-family="'Space Grotesk', sans-serif" font-size="11" font-weight="700" fill="#f0f0ef" text-anchor="middle">Grafite</text>
  <text x="158" y="186" font-family="'DM Mono', monospace" font-size="9" fill="rgba(240,240,239,0.4)" text-anchor="middle">#1e1e1e</text>

  <!-- Swatch 3: Surface -->
  <rect x="208" y="54" width="76" height="100" rx="8" fill="#252525"/>
  <text x="246" y="172" font-family="'Space Grotesk', sans-serif" font-size="11" font-weight="700" fill="#f0f0ef" text-anchor="middle">Surface</text>
  <text x="246" y="186" font-family="'DM Mono', monospace" font-size="9" fill="rgba(240,240,239,0.4)" text-anchor="middle">#252525</text>

  <!-- Swatch 4: Farpa (neon green) -->
  <rect x="296" y="54" width="76" height="100" rx="8" fill="#00ff88"/>
  <text x="334" y="172" font-family="'Space Grotesk', sans-serif" font-size="11" font-weight="700" fill="#f0f0ef" text-anchor="middle">Farpa</text>
  <text x="334" y="186" font-family="'DM Mono', monospace" font-size="9" fill="rgba(240,240,239,0.4)" text-anchor="middle">#00ff88</text>

  <!-- Swatch 5: Corte (cyan) -->
  <rect x="384" y="54" width="76" height="100" rx="8" fill="#00e5ff"/>
  <text x="422" y="172" font-family="'Space Grotesk', sans-serif" font-size="11" font-weight="700" fill="#f0f0ef" text-anchor="middle">Corte</text>
  <text x="422" y="186" font-family="'DM Mono', monospace" font-size="9" fill="rgba(240,240,239,0.4)" text-anchor="middle">#00e5ff</text>

  <!-- Swatch 6: Urgente (red) -->
  <rect x="472" y="54" width="76" height="100" rx="8" fill="#ff3b3b"/>
  <text x="510" y="172" font-family="'Space Grotesk', sans-serif" font-size="11" font-weight="700" fill="#f0f0ef" text-anchor="middle">Urgente</text>
  <text x="510" y="186" font-family="'DM Mono', monospace" font-size="9" fill="rgba(240,240,239,0.4)" text-anchor="middle">#ff3b3b</text>

  <!-- Swatch 7: Off-white -->
  <rect x="560" y="54" width="76" height="100" rx="8" fill="#f0f0ef"/>
  <text x="598" y="172" font-family="'Space Grotesk', sans-serif" font-size="11" font-weight="700" fill="#f0f0ef" text-anchor="middle">Off-white</text>
  <text x="598" y="186" font-family="'DM Mono', monospace" font-size="9" fill="rgba(240,240,239,0.4)" text-anchor="middle">#f0f0ef</text>

  <!-- Bottom accent line -->
  <line x1="32" y1="210" x2="668" y2="210" stroke="url(#grad)" stroke-width="1" opacity="0.4"/>
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="40%" stop-color="#00ff88"/>
      <stop offset="70%" stop-color="#00e5ff"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
  </defs>
</svg>
