<!DOCTYPE html><html lang="pt-BR"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Admin — farpa.ai</title>
<link rel="icon" type="image/svg+xml" href="../farpa-icon.svg">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../tokens.css"><link rel="stylesheet" href="../themes.css">
<style>
.admin-page{max-width:960px;margin:0 auto;padding:40px 28px 80px}
.admin-header{margin-bottom:32px;padding-bottom:20px;border-bottom:1px solid var(--border)}
.admin-header h1{font-size:28px;font-weight:900;letter-spacing:-.03em;margin-bottom:6px}
.admin-header p{font-family:var(--font-mono);font-size:12px;color:var(--text-3)}
.admin-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:28px}
.stat-card{background:var(--card-bg);border:1px solid var(--border);border-radius:var(--r-lg);padding:16px;text-align:center}
.stat-num{font-size:28px;font-weight:900;color:var(--accent);font-family:var(--font-mono)}
.stat-label{font-family:var(--font-mono);font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--text-3);margin-top:4px}
.admin-toolbar{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.admin-toolbar input{flex:1;min-width:200px;padding:8px 12px;border-radius:var(--r-md);border:1px solid var(--border-md);background:var(--input-bg);font-family:var(--font-mono);font-size:12px;color:var(--text-1)}
.admin-toolbar button{padding:8px 16px;border-radius:var(--r-md);border:1px solid var(--border-md);background:transparent;font-family:var(--font-mono);font-size:11px;cursor:pointer;transition:all .15s;color:var(--btn-text-on-surface)}
.admin-toolbar button:hover{border-color:var(--accent);color:var(--accent)}
.leads-table{width:100%;border-collapse:collapse;font-size:13px}
.leads-table th{font-family:var(--font-mono);font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--text-3);text-align:left;padding:10px 12px;border-bottom:2px solid var(--border-md)}
.leads-table td{padding:10px 12px;border-bottom:1px solid var(--border);color:var(--text-2);vertical-align:top}
.leads-table tr:hover td{background:var(--bg-2)}
.del-btn{background:none;border:1px solid rgba(183,28,28,.2);color:var(--accent-danger);border-radius:var(--r-sm);padding:3px 8px;font-size:10px;cursor:pointer;font-family:var(--font-mono)}
.del-btn:hover{background:rgba(183,28,28,.1)}
.empty-state{text-align:center;padding:40px;color:var(--text-3);font-family:var(--font-mono);font-size:13px}
.back-link{display:inline-flex;align-items:center;gap:6px;font-family:var(--font-mono);font-size:11px;color:var(--text-3);text-decoration:none;margin-bottom:12px}
.back-link:hover{color:var(--accent)}
.export-btn{background:var(--accent)!important;color:var(--btn-text-on-accent)!important;border-color:var(--accent)!important}
</style>
</head>
<body>
<div class="admin-page">
  <a href="../index.html" class="back-link">← farpa.ai</a>
  <div class="admin-header">
    <h1>Central de Leads</h1>
    <p id="admin-subtitle">Carregando...</p>
  </div>

  <div class="admin-stats">
    <div class="stat-card"><div class="stat-num" id="stat-total">—</div><div class="stat-label">Total</div></div>
    <div class="stat-card"><div class="stat-num" id="stat-today">—</div><div class="stat-label">Hoje</div></div>
    <div class="stat-card"><div class="stat-num" id="stat-week">—</div><div class="stat-label">7 dias</div></div>
  </div>

  <div class="admin-toolbar">
    <input type="text" id="search-input" placeholder="Buscar por nome ou email...">
    <button onclick="loadLeads()">↻ Atualizar</button>
    <button class="export-btn" onclick="exportCSV()">⬇ Exportar CSV</button>
  </div>

  <table class="leads-table">
    <thead><tr><th>Nome</th><th>Email</th><th>Telefone</th><th>Interesse</th><th>Data</th><th></th></tr></thead>
    <tbody id="leads-body"><tr><td colspan="6" class="empty-state">Carregando...</td></tr></tbody>
  </table>
</div>

<script>
const API='https://api-leads.rfelipefernandes.workers.dev/api/leads';
let allLeads=[];

async function loadLeads(){
  try{
    const r=await fetch(API);const d=await r.json();
    allLeads=d.results||[];
    renderLeads(allLeads);
    updateStats(allLeads);
    document.getElementById('admin-subtitle').textContent=allLeads.length+' leads registrados';
  }catch(e){
    document.getElementById('leads-body').innerHTML='<tr><td colspan="6" class="empty-state">Erro ao carregar leads: '+e.message+'</td></tr>';
  }
}

function renderLeads(leads){
  const q=(document.getElementById('search-input').value||'').toLowerCase();
  const filtered=q?leads.filter(l=>(l.name||'').toLowerCase().includes(q)||(l.email||'').toLowerCase().includes(q)):leads;
  const tb=document.getElementById('leads-body');
  if(!filtered.length){tb.innerHTML='<tr><td colspan="6" class="empty-state">Nenhum lead encontrado.</td></tr>';return}
  tb.innerHTML=filtered.map(l=>`<tr>
    <td><strong>${esc(l.name)}</strong></td>
    <td>${esc(l.email)}</td>
    <td>${esc(l.phone||'—')}</td>
    <td>${esc(l.interest||'—')}</td>
    <td style="font-family:var(--font-mono);font-size:11px;color:var(--text-3)">${new Date(l.created_at).toLocaleDateString('pt-BR')}</td>
    <td><button class="del-btn" onclick="deleteLead(${l.id})">✕</button></td>
  </tr>`).join('');
}

function updateStats(leads){
  const now=new Date();const today=now.toISOString().slice(0,10);
  const weekAgo=new Date(now-7*86400000).toISOString();
  document.getElementById('stat-total').textContent=leads.length;
  document.getElementById('stat-today').textContent=leads.filter(l=>l.created_at&&l.created_at.startsWith(today)).length;
  document.getElementById('stat-week').textContent=leads.filter(l=>l.created_at&&l.created_at>=weekAgo).length;
}

async function deleteLead(id){
  if(!confirm('Remover este lead?'))return;
  try{await fetch(API+'/'+id,{method:'DELETE'});loadLeads()}catch(e){alert('Erro: '+e.message)}
}

function exportCSV(){
  const header='Nome,Email,Telefone,Interesse,Data\n';
  const rows=allLeads.map(l=>[l.name,l.email,l.phone||'',l.interest||'',l.created_at||''].map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(',')).join('\n');
  const blob=new Blob([header+rows],{type:'text/csv'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='farpa-leads-'+new Date().toISOString().slice(0,10)+'.csv';a.click();
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

document.getElementById('search-input').addEventListener('input',()=>renderLeads(allLeads));
loadLeads();
</script>
</body></html>
